name: Release Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  release-gate:
    name: Check Release Gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: irlobby
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d irlobby"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SECRET_KEY: ci-release-gate-only-not-a-real-secret-key-2026-04-28-IRLobby
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/irlobby
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver,api.irlobby.com
      CORS_ALLOWED_ORIGINS: https://irlobby.com,https://www.irlobby.com
      CSRF_TRUSTED_ORIGINS: https://irlobby.com,https://www.irlobby.com
      WEBSOCKET_ALLOWED_ORIGINS: https://irlobby.com,https://www.irlobby.com

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Run release gate
        run: npm run check:release

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install GDAL system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev binutils libproj-dev

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r irlobby_backend/requirements.txt

      - name: Enable PostGIS
        run: |
          psql "postgres://postgres:postgres@localhost:5432/irlobby" -c "CREATE EXTENSION IF NOT EXISTS postgis;"

      - name: Backend checks
        working-directory: irlobby_backend
        run: |
          python manage.py check --deploy
          pytest
