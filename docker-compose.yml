version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-irlobby}
      POSTGRES_USER: ${POSTGRES_USER:-irlobby}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-irlobby} -d ${POSTGRES_DB:-irlobby}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./irlobby_backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "true"
      RUN_COLLECTSTATIC: "true"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    command: >
      gunicorn irlobby_backend.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  ws:
    build:
      context: ./irlobby_backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "false"
      RUN_COLLECTSTATIC: "false"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    command: >
      daphne -b 0.0.0.0 -p 8001 irlobby_backend.asgi:application
    ports:
      - "8001:8001"
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_worker:
    build:
      context: ./irlobby_backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    command: >
      celery -A irlobby_backend worker -l info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_beat:
    build:
      context: ./irlobby_backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    command: >
      celery -A irlobby_backend beat -l info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
