version: "3.9"

services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-irlobby}
      POSTGRES_USER: ${POSTGRES_USER:-irlobby}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-irlobby} -d ${POSTGRES_DB:-irlobby}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  backend:
    build:
      context: ./irlobby_backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "true"
      RUN_COLLECTSTATIC: "true"
    command: >
      gunicorn irlobby_backend.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  ws:
    build:
      context: ./irlobby_backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "false"
      RUN_COLLECTSTATIC: "false"
    command: >
      daphne -b 0.0.0.0 -p 8001 irlobby_backend.asgi:application
    ports:
      - "8001:8001"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
