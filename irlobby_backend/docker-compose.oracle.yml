services:
  postgres:
    image: postgis/postgis:16-3.4
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-irlobby}
      POSTGRES_USER: ${POSTGRES_USER:-irlobby}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-irlobby} -d ${POSTGRES_DB:-irlobby}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    profiles: ["localdb"]

  redis:
    image: redis:7-alpine
    env_file:
      - .env.production
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    environment:
      RUN_MIGRATIONS: "true"
      RUN_COLLECTSTATIC: "true"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    command:
      [
        "gunicorn",
        "irlobby_backend.wsgi:application",
        "--bind",
        "0.0.0.0:8000",
        "--workers",
        "3",
        "--timeout",
        "120",
      ]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/health/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy

  ws:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    environment:
      RUN_MIGRATIONS: "false"
      RUN_COLLECTSTATIC: "false"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    command:
      [
        "daphne",
        "-b",
        "0.0.0.0",
        "-p",
        "8001",
        "irlobby_backend.asgi:application",
      ]
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    command:
      ["celery", "-A", "irlobby_backend", "worker", "-l", "info"]
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    command:
      ["celery", "-A", "irlobby_backend", "beat", "-l", "info"]
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    env_file:
      - .env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./deploy/oracle/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./deploy/oracle/certbot-webroot:/var/www/certbot
      - /opt/irlobby/web:/usr/share/nginx/html:ro
    depends_on:
      web:
        condition: service_healthy
      ws:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
