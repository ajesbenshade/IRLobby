name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Check web client
        run: npm run check:web

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r irlobby_backend/requirements.txt

      - name: Run Django checks
        working-directory: irlobby_backend
        run: |
          python manage.py check

      - name: Lint Python (optional)
        working-directory: irlobby_backend
        run: |
          python -m py_compile $(find . -name "*.py") || true
