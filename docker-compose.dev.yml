version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: irlobby
      POSTGRES_USER: irlobby
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./irlobby_backend
      dockerfile: Dockerfile
    volumes:
      - ./irlobby_backend:/app
    ports:
      - "8000:8000"
    environment:
      DEBUG: "1"
      DATABASE_URL: postgres://irlobby:password@db:5432/irlobby
    command: >
      sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
